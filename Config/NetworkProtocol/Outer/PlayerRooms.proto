syntax = "proto3";
package BattleOfCell.Message;
import "Outer/Meta.proto";

/// 客户端发起房间匹配请求
message PlayerRoomsReq // IRequest,PlayerRoomsResp
{

}

message PlayerRoomsResp // IResponse
{
  MetaData meta = 1;
  repeated RespError error = 2;
  /// 业务是否成功（与 meta 同级；true 时 LightProto 会写出该字段）
  bool ok = 3;
}
