syntax = "proto3";
package BattleOfCell.Message;
import "Outer/Meta.proto";

/// 客户端进家园请求
message EntryHomeReq // IRequest,EntryHomeResp
{
    string token = 1;
}

message EntryHomeResp // IResponse
{
    MetaData meta = 1;
    repeated RespError error = 2;
    /// 业务是否成功（与 meta 同级；true 时 LightProto 会写出该字段）
    bool ok = 3;
}
