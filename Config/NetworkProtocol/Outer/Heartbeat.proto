syntax = "proto3";
package BattleOfCell.Message;

/// 客户端心跳。sequence 在单次连接内从 1 开始递增，0 保留。
message SessionHeartbeatPing // IRequest,SessionHeartbeatPong
{
    uint64 timestamp = 1;
}

/// 服务端心跳确认。sequence 原样回显 SessionHeartbeatPing.sequence。
message SessionHeartbeatPong // IResponse
{
    uint64 timestamp = 1;
}
